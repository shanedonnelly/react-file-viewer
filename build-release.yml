name: Build & Release

on:
  push:
    tags:
      - "v*"         # déclenché sur : git tag v1.0.0 && git push --tags
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Commit dist/ to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build dist for ${{ github.ref_name }}"
          git push origin HEAD:main
